<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CollegeEvents</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh">

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">College<span>Events</span></a>
      <div class="nav-links">
        <a href="index.html"><span>Events</span></a>
      </div>
    </div>
  </nav>

  <!-- ── Login Card ── -->
  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px">
    <div style="width: 100%; max-width: 440px">

      <!-- Brand mark -->
      <div style="text-align: center; margin-bottom: 36px">
        <div style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 900; color: var(--white); margin-bottom: 8px">
          College<span style="color: var(--saffron)">Events</span>
        </div>
        <p style="color: var(--muted); font-size: 0.88rem">Sign in to manage or register for events</p>
      </div>

      <div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 32px">

        <!-- Demo hint -->
        <div style="background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.82rem; color: rgba(255,255,255,0.7)">
          <strong style="color: var(--saffron)">Demo Organizer:</strong><br>
          Email: <code style="font-family: var(--font-mono)">organizer@college.edu</code><br>
          Password: <code style="font-family: var(--font-mono)">organizer</code>
        </div>

        <form id="login-form" novalidate>
          <div style="display: flex; flex-direction: column; gap: 18px">

            <div class="form-group">
              <label for="login-email">Email Address</label>
              <input
                id="login-email"
                type="email"
                placeholder="you@college.edu"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="login-password">Password</label>
              <input
                id="login-password"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
            <div class="form-group">
          <label>Select Role</label>
          <select id="role">
            <option value="student">student</option>
            <option value="organizer">Organizer</option>
          </select>
        </div>

           <p style="text-align: center; font-size: 0.85rem; color: var(--muted)">
               <a href="index.html">sign in →</a>
            </p> 

            

            <p style="text-align: center; font-size: 0.85rem; color: var(--muted)">
              Just browsing? <a href="index.html">View events →</a>
            </p>

          </div>
        </form>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>CollegeEvents · <a href="index.html">Browse Events</a></p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
